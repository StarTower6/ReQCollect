# ReQCollect — Nginx 反向代理
# 直接 serve Vue SPA 静态文件（不经过 FastAPI）
# SSE API 请求代理到后端

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    upstream reqcollect_backend {
        server reqcollect:9900;
    }

    server {
        listen 80;
        server_name _;

        # ── Vue SPA 静态文件（Nginx 直接 serve，不经过 Python） ──
        root /usr/share/nginx/html;
        index index.html;

        # ── 旧版 static/ 目录 ──
        location /static/ {
            proxy_pass http://reqcollect_backend;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # ── SSE API（禁止缓冲） ──
        location /api/ {
            proxy_pass http://reqcollect_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering          off;
            proxy_cache              off;
            proxy_read_timeout       600s;
            proxy_http_version       1.1;
            proxy_set_header         Connection '';
            chunked_transfer_encoding off;
        }

        # ── Vue SPA: 所有非 API 请求返回 index.html（hash 路由） ──
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
