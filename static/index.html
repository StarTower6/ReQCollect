<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReQCollect — 业务需求分析</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #f7f9fd;
            --sidebar: #f2f5fb;
            --sidebar-hover: #e8eef8;
            --panel: #ffffff;
            --line: #e4e9f2;
            --line-strong: #d4deec;
            --text: #202634;
            --muted: #6f7d92;
            --muted-light: #9aa6b8;
            --brand: #3f7df6;
            --brand-dark: #2366dc;
            --brand-soft: #edf4ff;
            --bubble-user: #e8f1ff;
            --bubble-assistant: #ffffff;
            --radius: 8px;
            --shadow: 0 16px 44px rgba(31, 69, 126, 0.11);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            overflow: hidden;
            color: var(--text);
            background: var(--bg);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        button,
        textarea,
        input {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
        }

        .app {
            display: grid;
            height: 100vh;
            grid-template-columns: 268px minmax(0, 1fr);
        }

        .sidebar {
            display: flex;
            min-width: 0;
            flex-direction: column;
            padding: 12px;
            border-right: 1px solid var(--line);
            background: var(--sidebar);
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 42px;
            padding: 4px 6px 12px;
        }

        .brand-mark {
            position: relative;
            width: 30px;
            height: 30px;
            flex: 0 0 30px;
            border-radius: 50%;
            background: linear-gradient(140deg, #7db0ff, var(--brand) 58%, #2c62cf);
            box-shadow: 0 10px 24px rgba(63, 125, 246, 0.24);
        }

        .brand-mark::before,
        .brand-mark::after {
            position: absolute;
            content: "";
            border-radius: 50%;
            background: #ffffff;
        }

        .brand-mark::before {
            width: 13px;
            height: 13px;
            left: 6px;
            top: 7px;
        }

        .brand-mark::after {
            width: 7px;
            height: 7px;
            right: 6px;
            bottom: 7px;
            opacity: 0.82;
        }

        .brand-name {
            overflow: hidden;
            font-size: 16px;
            font-weight: 760;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar-action {
            display: flex;
            align-items: center;
            gap: 9px;
            width: 100%;
            min-height: 42px;
            padding: 0 12px;
            border-radius: var(--radius);
            color: #24334b;
            background: #ffffff;
            font-size: 14px;
            font-weight: 680;
            box-shadow: 0 8px 20px rgba(31, 69, 126, 0.06);
        }

        .sidebar-action:hover {
            background: #fbfdff;
        }

        .sidebar-search {
            margin-top: 10px;
            height: 38px;
            padding: 0 11px;
            border: 1px solid transparent;
            border-radius: var(--radius);
            outline: none;
            color: var(--text);
            background: #e9eef7;
            font-size: 13px;
        }

        .sidebar-search:focus {
            border-color: rgba(63, 125, 246, 0.35);
            background: #ffffff;
        }

        .history-label {
            margin: 18px 6px 8px;
            color: var(--muted-light);
            font-size: 12px;
            font-weight: 720;
        }

        #session-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding-right: 2px;
        }

        .session-item {
            position: relative;
            display: flex;
            min-height: 40px;
            align-items: center;
            gap: 8px;
            margin-bottom: 3px;
            padding: 8px 10px;
            border-radius: var(--radius);
            color: #354258;
            background: transparent;
            cursor: pointer;
        }

        .session-item:hover {
            background: var(--sidebar-hover);
        }

        .session-item.active {
            color: #17356b;
            background: #ffffff;
            box-shadow: 0 8px 20px rgba(31, 69, 126, 0.07);
        }

        .session-item.pinned {
            background: rgba(237, 244, 255, 0.74);
        }

        .session-title {
            min-width: 0;
            flex: 1;
        }

        .session-title .name {
            display: block;
            overflow: hidden;
            font-size: 13px;
            font-weight: 590;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .session-title .meta {
            display: block;
            margin-top: 2px;
            color: var(--muted-light);
            font-size: 11px;
        }

        .session-actions {
            display: flex;
            flex: 0 0 auto;
            align-items: center;
            gap: 3px;
        }

        .session-action-btn {
            display: inline-flex;
            width: 25px;
            height: 25px;
            align-items: center;
            justify-content: center;
            border-radius: 7px;
            color: #7a879b;
            background: transparent;
            font-size: 12px;
            font-weight: 760;
            line-height: 1;
        }

        .session-action-btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2.2;
        }

        .session-action-btn:hover {
            color: var(--brand-dark);
            background: #ffffff;
        }

        .session-action-btn.active {
            color: #ffffff;
            background: var(--brand);
        }

        .session-action-btn.danger:hover {
            color: #b42318;
            background: #fff0ee;
        }

        .session-empty {
            padding: 10px 6px;
            color: var(--muted-light);
            font-size: 13px;
        }

        .sidebar-footer {
            display: grid;
            gap: 6px;
            padding-top: 10px;
            border-top: 1px solid var(--line);
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 9px;
            min-height: 34px;
            padding: 0 9px;
            border-radius: var(--radius);
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
        }

        .sidebar-link:hover {
            color: #24334b;
            background: var(--sidebar-hover);
        }

        .main {
            display: grid;
            min-width: 0;
            height: 100vh;
            grid-template-rows: 54px minmax(0, 1fr);
            background:
                radial-gradient(circle at 50% 28%, rgba(63, 125, 246, 0.08), transparent 360px),
                var(--bg);
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, auto) minmax(0, 1fr);
            align-items: center;
            gap: 10px;
            padding: 0 22px;
            border-bottom: 1px solid rgba(228, 233, 242, 0.72);
            background: rgba(247, 249, 253, 0.82);
            backdrop-filter: blur(18px);
        }

        .mobile-menu {
            display: none;
            place-items: center;
            justify-self: start;
            width: 34px;
            height: 34px;
            border-radius: var(--radius);
            color: var(--text);
            background: var(--brand-soft);
            font-size: 19px;
        }

        #main-header {
            overflow: hidden;
            justify-self: center;
            max-width: min(360px, 42vw);
            font-size: 15px;
            font-weight: 720;
            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-self: end;
        }

        .status-chip {
            display: inline-flex;
            min-height: 30px;
            align-items: center;
            justify-content: center;
            padding: 0 11px;
            border-radius: 999px;
            color: #426289;
            background: #eef3fb;
            font-size: 12px;
            font-weight: 680;
            line-height: 1;
        }

        .chat-shell {
            position: relative;
            display: grid;
            min-height: 0;
            grid-template-rows: minmax(0, 1fr) auto;
        }

        #chat {
            min-height: 0;
            overflow-y: auto;
            padding: 34px 24px 24px;
        }

        .chat-inner {
            width: min(820px, 100%);
            margin: 0 auto;
        }

        .welcome {
            display: flex;
            min-height: calc(100vh - 250px);
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .welcome-card {
            width: min(640px, 100%);
        }

        .welcome-logo {
            position: relative;
            width: 56px;
            height: 56px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: linear-gradient(140deg, #7db0ff, var(--brand) 58%, #2c62cf);
            box-shadow: 0 18px 44px rgba(63, 125, 246, 0.22);
        }

        .welcome-logo::before,
        .welcome-logo::after {
            position: absolute;
            content: "";
            border-radius: 50%;
            background: #ffffff;
        }

        .welcome-logo::before {
            width: 25px;
            height: 25px;
            left: 11px;
            top: 12px;
        }

        .welcome-logo::after {
            width: 12px;
            height: 12px;
            right: 11px;
            bottom: 12px;
            opacity: 0.82;
        }

        .welcome-title {
            font-size: 26px;
            font-weight: 760;
            color: #202b3f;
        }

        .welcome-subtitle {
            margin-top: 10px;
            color: var(--muted);
            font-size: 15px;
        }

        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 28px;
        }

        .prompt-card {
            display: flex;
            min-height: 54px;
            align-items: center;
            justify-content: center;
            padding: 11px 13px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            color: #33445d;
            background: rgba(255, 255, 255, 0.76);
            text-align: center;
            font-size: 13px;
        }

        .prompt-card:hover {
            border-color: var(--line-strong);
            background: #ffffff;
            box-shadow: 0 10px 24px rgba(31, 69, 126, 0.08);
        }

        .msg-row {
            display: flex;
            margin-bottom: 22px;
        }

        .msg-row.user {
            justify-content: flex-end;
        }

        .msg-row.assistant {
            justify-content: flex-start;
        }

        .avatar {
            display: grid;
            width: 30px;
            height: 30px;
            flex: 0 0 30px;
            place-items: center;
            margin-right: 10px;
            border-radius: 50%;
            color: #ffffff;
            background: var(--brand);
            font-size: 12px;
            font-weight: 800;
        }

        .msg {
            max-width: min(680px, 88%);
            border-radius: var(--radius);
            font-size: 15px;
            line-height: 1.72;
            word-break: break-word;
        }

        .msg.user {
            padding: 10px 14px;
            color: #213657;
            background: var(--bubble-user);
        }

        .msg.assistant {
            padding: 2px 0;
            color: #263247;
            background: transparent;
        }

        .event {
            width: fit-content;
            max-width: 100%;
            margin: 10px auto 18px;
            padding: 6px 10px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.76);
            font-size: 12px;
        }

        .quick-replies {
            display: flex;
            max-width: min(680px, calc(100% - 40px));
            flex-wrap: wrap;
            gap: 8px;
            margin: -12px 0 22px 40px;
        }

        .quick-replies.from-event {
            justify-content: center;
            max-width: 100%;
            margin: -8px auto 18px;
        }

        .quick-replies.grouped {
            display: grid;
            gap: 12px;
        }

        .quick-reply-group {
            display: grid;
            gap: 8px;
        }

        .quick-reply-title {
            color: var(--muted);
            font-size: 13px;
            font-weight: 680;
            line-height: 1.45;
        }

        .quick-reply-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-reply-btn {
            display: inline-flex;
            min-height: 34px;
            max-width: 100%;
            align-items: center;
            justify-content: center;
            padding: 7px 11px;
            border: 1px solid rgba(63, 125, 246, 0.28);
            border-radius: 999px;
            color: var(--brand-dark);
            background: #ffffff;
            font-size: 13px;
            font-weight: 650;
            line-height: 1.35;
            text-align: left;
        }

        .quick-reply-btn:hover {
            border-color: rgba(63, 125, 246, 0.5);
            background: var(--brand-soft);
        }

        .quick-replies.multi-select .quick-reply-btn,
        .quick-reply-group.multi-select .quick-reply-btn {
            padding-left: 12px;
        }

        .quick-replies.multi-select .quick-reply-btn::before,
        .quick-reply-group.multi-select .quick-reply-btn::before {
            content: "";
            display: inline-grid;
            width: 16px;
            height: 16px;
            margin-right: 8px;
            box-sizing: border-box;
            border: 1px solid rgba(63, 125, 246, 0.45);
            border-radius: 4px;
            place-items: center;
            flex: 0 0 auto;
            color: #ffffff;
            font-size: 12px;
            font-weight: 800;
            line-height: 1;
            background: #ffffff;
        }

        .quick-reply-btn.selected,
        .quick-reply-btn[aria-pressed="true"] {
            border-color: rgba(63, 125, 246, 0.72);
            color: #174fae;
            background: var(--brand-soft);
        }

        .quick-replies.multi-select .quick-reply-btn.selected::before,
        .quick-replies.multi-select .quick-reply-btn[aria-pressed="true"]::before,
        .quick-reply-group.multi-select .quick-reply-btn.selected::before,
        .quick-reply-group.multi-select .quick-reply-btn[aria-pressed="true"]::before {
            content: "✓";
            border-color: var(--brand);
            background: var(--brand);
            box-shadow: 0 0 0 2px rgba(63, 125, 246, 0.16);
        }

        .quick-reply-btn:focus-visible {
            outline: 2px solid rgba(63, 125, 246, 0.38);
            outline-offset: 2px;
        }

        .quick-reply-btn:disabled {
            cursor: default;
            opacity: 0.55;
        }

        .quick-reply-actions {
            display: flex;
            width: 100%;
            gap: 8px;
            margin-top: 2px;
        }

        .quick-reply-submit,
        .quick-reply-clear {
            min-height: 32px;
            padding: 0 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 680;
        }

        .quick-reply-submit {
            color: #ffffff;
            background: var(--brand);
        }

        .quick-reply-submit:hover {
            background: var(--brand-dark);
        }

        .quick-reply-submit:disabled {
            cursor: default;
            background: #b9c7dc;
        }

        .quick-reply-clear {
            color: var(--muted);
            background: #eef3fb;
        }

        .composer-wrap {
            padding: 14px 24px 22px;
            background: linear-gradient(180deg, rgba(247, 249, 253, 0), var(--bg) 28%);
        }

        .composer {
            width: min(820px, 100%);
            margin: 0 auto;
            border: 1px solid var(--line-strong);
            border-radius: 14px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        #msg-input {
            display: block;
            width: 100%;
            min-height: 54px;
            max-height: 180px;
            resize: none;
            padding: 16px 17px 8px;
            border: 0;
            outline: none;
            color: var(--text);
            background: transparent;
            font-size: 15px;
            line-height: 1.55;
        }

        .composer-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-height: 48px;
            padding: 7px 9px 9px;
        }

        .tool-group {
            display: flex;
            min-width: 0;
            flex-wrap: wrap;
            gap: 7px;
        }

        .tool-btn {
            display: inline-flex;
            min-height: 32px;
            align-items: center;
            justify-content: center;
            padding: 0 11px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: #50627d;
            background: #f8fbff;
            font-size: 13px;
            font-weight: 650;
            white-space: nowrap;
        }

        .tool-btn:hover,
        .tool-btn.active {
            border-color: rgba(63, 125, 246, 0.34);
            color: var(--brand-dark);
            background: var(--brand-soft);
        }

        .tool-btn:disabled {
            cursor: default;
            opacity: 0.58;
        }

        #send-btn {
            display: grid;
            width: 34px;
            height: 34px;
            flex: 0 0 34px;
            place-items: center;
            border-radius: 50%;
            color: #ffffff;
            background: var(--brand);
            font-size: 18px;
            font-weight: 800;
        }

        #send-btn:hover {
            background: var(--brand-dark);
        }

        .msg.assistant h1,
        .msg.assistant h2,
        .msg.assistant h3 {
            margin: 15px 0 7px;
            color: #1d2b42;
        }

        .msg.assistant h1 {
            font-size: 1.32em;
        }

        .msg.assistant h2 {
            font-size: 1.16em;
        }

        .msg.assistant h3 {
            font-size: 1.05em;
        }

        .msg.assistant p {
            margin: 6px 0;
        }

        .msg.assistant ul,
        .msg.assistant ol {
            margin: 7px 0;
            padding-left: 22px;
        }

        .msg.assistant li {
            margin: 3px 0;
        }

        .msg.assistant table {
            width: 100%;
            margin: 12px 0;
            border-collapse: collapse;
            font-size: 13px;
        }

        .msg.assistant th,
        .msg.assistant td {
            padding: 7px 9px;
            border: 1px solid var(--line);
            text-align: left;
        }

        .msg.assistant th {
            background: #f3f6fb;
            font-weight: 720;
        }

        .msg.assistant code {
            padding: 2px 5px;
            border-radius: 5px;
            color: var(--brand-dark);
            background: var(--brand-soft);
            font-size: 0.92em;
        }

        .msg.assistant pre {
            overflow-x: auto;
            margin: 10px 0;
            padding: 13px;
            border-radius: var(--radius);
            background: #17233a;
            color: #edf4ff;
        }

        .msg.assistant pre code {
            padding: 0;
            color: inherit;
            background: none;
        }

        .msg.assistant blockquote {
            margin: 9px 0;
            padding-left: 12px;
            border-left: 3px solid var(--brand);
            color: #50627d;
        }

        @media (max-width: 820px) {
            .app {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .mobile-menu {
                display: grid;
                place-items: center;
            }

            .topbar {
                padding: 0 14px;
            }

            #chat {
                padding: 24px 14px 16px;
            }

            .composer-wrap {
                padding: 12px 12px 16px;
            }

            .prompt-grid {
                grid-template-columns: 1fr;
            }

            .welcome {
                min-height: calc(100vh - 280px);
            }

            .msg {
                max-width: 94%;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar" aria-label="历史会话">
            <div class="brand-row">
                <div class="brand-mark" aria-hidden="true"></div>
                <div class="brand-name">PM Agent</div>
            </div>
            <button class="sidebar-action" type="button" onclick="newChat()">
                <span aria-hidden="true">＋</span>
                <span>新对话</span>
            </button>
            <input class="sidebar-search" id="session-search" type="search" placeholder="搜索历史会话" oninput="renderSessions()">
            <div class="history-label">最近</div>
            <div id="session-list">
                <div class="session-empty">暂无历史会话</div>
            </div>
            <div class="sidebar-footer">
                <a class="sidebar-link" href="/docs">API 文档</a>
                <a class="sidebar-link" href="/api/health">服务状态</a>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <button class="mobile-menu" type="button" onclick="newChat()" aria-label="新对话">＋</button>
                <div id="main-header">PM Agent</div>
                <div class="topbar-actions">
                    <span class="status-chip" id="score-label">完整度 0%</span>
                    <span class="status-chip" id="session-label">未开始</span>
                </div>
            </header>

            <section class="chat-shell" aria-label="对话区">
                <div id="chat">
                    <div class="chat-inner" id="chat-inner">
                        <div class="welcome">
                            <div class="welcome-card">
                                <div class="welcome-logo" aria-hidden="true"></div>
                                <div class="welcome-title">我是 PM Agent，很高兴见到你！</div>
                                <div class="welcome-subtitle">开始描述你的产品想法，我会帮你追问需求并生成 PRD。</div>
                                <div class="prompt-grid">
                                    <button class="prompt-card" type="button" onclick="usePrompt('我想做一个企业报销审批系统')">企业报销审批系统</button>
                                    <button class="prompt-card" type="button" onclick="usePrompt('我想做一个餐厅外卖智能客服系统')">餐厅外卖智能客服</button>
                                    <button class="prompt-card" type="button" onclick="usePrompt('生成 PRD')">基于当前信息生成 PRD</button>
                                    <button class="prompt-card" type="button" onclick="toggleMode()">切换生成模式</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="composer-wrap">
                    <div class="composer">
                        <textarea id="msg-input" rows="1" placeholder="给 PM Agent 发送消息"></textarea>
                        <div class="composer-bar">
                            <div class="tool-group">
                                <button class="tool-btn active" type="button">深度挖掘</button>
                                <button class="tool-btn" id="upload-knowledge-btn" type="button" onclick="openKnowledgeUpload()">上传知识</button>
                                <input id="knowledge-file-input" type="file" accept=".md,.txt,text/markdown,text/plain" hidden>
                                <button class="tool-btn" id="knowledge-toggle" type="button" onclick="toggleKnowledge()" aria-pressed="false">知识检索</button>
                                <button class="tool-btn" id="mode-toggle" type="button" onclick="toggleMode()">一键生成</button>
                            </div>
                            <button id="send-btn" type="button" onclick="sendMessage()" aria-label="发送">↑</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let sessionId = null;
        let mode = 'one_shot';
        let useKnowledge = false;
        let sessionsCache = [];

        const inputEl = document.getElementById('msg-input');
        const knowledgeFileInput = document.getElementById('knowledge-file-input');
        inputEl.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
        inputEl.addEventListener('input', autoGrowInput);
        knowledgeFileInput.addEventListener('change', uploadKnowledgeFile);

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function autoGrowInput() {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
        }

        function renderMarkdown(text) {
            if (typeof marked !== 'undefined') {
                return marked.parse(text);
            }
            return escapeHtml(text);
        }

        function welcomeHtml(title = '我是 PM Agent，很高兴见到你！', subtitle = '开始描述你的产品想法，我会帮你追问需求并生成 PRD。') {
            return `<div class="welcome"><div class="welcome-card">
                <div class="welcome-logo" aria-hidden="true"></div>
                <div class="welcome-title">${escapeHtml(title)}</div>
                <div class="welcome-subtitle">${escapeHtml(subtitle)}</div>
                <div class="prompt-grid">
                    <button class="prompt-card" type="button" onclick="usePrompt('我想做一个企业报销审批系统')">企业报销审批系统</button>
                    <button class="prompt-card" type="button" onclick="usePrompt('我想做一个餐厅外卖智能客服系统')">餐厅外卖智能客服</button>
                    <button class="prompt-card" type="button" onclick="usePrompt('生成 PRD')">基于当前信息生成 PRD</button>
                    <button class="prompt-card" type="button" onclick="toggleMode()">切换生成模式</button>
                </div></div></div>`;
        }

        function chatInner() {
            return document.getElementById('chat-inner');
        }

        function clearChat() {
            chatInner().innerHTML = '';
        }

        function ensureChatStarted() {
            const welcome = chatInner().querySelector('.welcome');
            if (welcome) {
                chatInner().innerHTML = '';
            }
            if (!sessionId) {
                sessionId = 'session-' + Date.now();
                updateSessionLabel();
            }
        }

        function scrollChat() {
            const chat = document.getElementById('chat');
            chat.scrollTop = chat.scrollHeight;
        }

        function addMessage(role, text) {
            ensureChatStarted();
            const row = document.createElement('div');
            row.className = 'msg-row ' + role;
            if (role === 'assistant') {
                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = 'PM';
                row.appendChild(avatar);
            }
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            if (role === 'assistant') {
                div.innerHTML = renderMarkdown(text);
            } else {
                div.textContent = text;
            }
            row.appendChild(div);
            chatInner().appendChild(row);
            scrollChat();
            return div;
        }

        function addEvent(text) {
            ensureChatStarted();
            const div = document.createElement('div');
            div.className = 'event';
            div.textContent = text;
            chatInner().appendChild(div);
            scrollChat();
            return div;
        }

        function normalizeQuickReplyOption(raw) {
            const text = String(raw || '')
                .replace(/\*\*/g, '')
                .replace(/`/g, '')
                .replace(/\s+/g, ' ')
                .replace(/^\s*(?:[-*+•]\s*)?/, '')
                .replace(/^\s*(?:(?:选项|方案)\s*)?[\(（]?(?:[A-Ha-h]|[1-9][0-9]?|[一二三四五六七八九十]|[①②③④⑤⑥⑦⑧⑨⑩])[\)）.、:：]\s*/, '')
                .replace(/^[“"'']|[”"'']$/g, '')
                .trim();
            if (!text || text.length > 90) return '';
            if (/^(问题|请问|当前|已覆盖|待挖掘|需求完整度|Sufficiency|Missing)/i.test(text)) return '';
            return text;
        }

        function looksLikePendingQuestion(text) {
            const tail = String(text || '').slice(-1200);
            return /[?？]|请选择|选一|选择|确认|倾向|更适合|是否|要不要|还是|或者/.test(tail);
        }

        function uniqueOptions(options) {
            const seen = new Set();
            const result = [];
            for (const option of options) {
                const value = normalizeQuickReplyOption(option);
                if (!value || seen.has(value)) continue;
                seen.add(value);
                result.push(value);
                if (result.length >= 6) break;
            }
            return result;
        }

        function extractInlineOptions(text) {
            const tail = String(text || '').replace(/\s+/g, ' ').slice(-500);
            const pair = tail.match(/([^，。！？?；;：:]{2,24})(?:还是|或者|或)([^，。！？?；;：:]{2,24})/);
            if (!pair) return [];
            return [pair[1], pair[2]].map(part => {
                return part
                    .replace(/^.*(?:是|选择|采用|按)/, '')
                    .replace(/^(比如|例如|可以|为)/, '')
                    .replace(/(呢|吗|更合适|更适合)$/g, '')
                    .trim();
            });
        }

        function isQuestionHeader(text) {
            const value = String(text || '').trim();
            return /[?？]/.test(value) ||
                /(?:请选择|选择|确认|倾向|更适合|哪些|哪几|哪个|哪种|什么|是否|要不要|规模|人群|量级|比如|例如)/.test(value);
        }

        function normalizeQuickReplyQuestion(raw) {
            return String(raw || '')
                .replace(/\*\*/g, '')
                .replace(/`/g, '')
                .replace(/\s+/g, ' ')
                .replace(/^\s*(?:[-*+•]\s*)?/, '')
                .replace(/^\s*[\(（]?(?:[1-9][0-9]?|[一二三四五六七八九十]|[①②③④⑤⑥⑦⑧⑨⑩])[\)）.、:：]\s*/, '')
                .replace(/[：:]\s*$/, '')
                .trim();
        }

        function normalizeQuickReplyGroups(groups) {
            const normalized = [];
            for (const group of groups || []) {
                const options = uniqueOptions(group.options || []);
                if (!options.length) continue;
                const question = normalizeQuickReplyQuestion(group.question || '');
                const mode = group.mode || inferQuickReplyMode(question, options);
                normalized.push({question, options, mode});
            }
            return normalized;
        }

        function extractQuickReplyGroups(text) {
            if (!looksLikePendingQuestion(text)) return [];

            const plain = String(text || '').replace(/```[\s\S]*?```/g, '');
            const groups = [];
            const fallbackOptions = [];
            let current = null;

            function finishCurrent() {
                if (current && current.options.length) {
                    groups.push(current);
                }
                current = null;
            }

            for (const rawLine of plain.split('\n')) {
                const line = rawLine.trim();
                if (!line) continue;

                const optionMatch = line.match(/^(?:[-*+•]\s*)?(?:(?:选项|方案)\s*)?[\(（]?([A-Ha-h]|[1-9][0-9]?|[一二三四五六七八九十]|[①②③④⑤⑥⑦⑧⑨⑩])[\)）.、:：]\s*(.+)$/);
                if (optionMatch) {
                    const marker = optionMatch[1];
                    const body = optionMatch[2].trim();
                    const numericMarker = !/^[A-Ha-h]$/.test(marker);
                    if (numericMarker && isQuestionHeader(body) && body.length > 8) {
                        finishCurrent();
                        current = {question: body, options: [], mode: inferQuickReplyMode(body, [])};
                        continue;
                    }
                    if (current) {
                        current.options.push(body);
                    } else {
                        fallbackOptions.push(body);
                    }
                    continue;
                }

                const bullet = line.match(/^[-*+•]\s+(.+)$/);
                if (bullet) {
                    if (current) {
                        current.options.push(bullet[1]);
                    } else {
                        fallbackOptions.push(bullet[1]);
                    }
                    continue;
                }

                if (isQuestionHeader(line)) {
                    finishCurrent();
                    current = {question: line, options: [], mode: inferQuickReplyMode(line, [])};
                }
            }
            finishCurrent();

            if (groups.length) return normalizeQuickReplyGroups(groups);

            let options = uniqueOptions(fallbackOptions);
            if (!options.length) {
                options = uniqueOptions(extractInlineOptions(plain));
            }
            if (!options.length && /是否|要不要|可以吗|确认|生成\s*PRD|生成PRD/.test(plain)) {
                options = ['是', '否', '请你推荐方案'];
            }
            if (!options.length) {
                options = ['请你推荐默认方案', '暂不确定，先跳过'];
            }
            return normalizeQuickReplyGroups([{
                question: '',
                options,
                mode: inferQuickReplyMode(plain, options),
            }]);
        }

        function extractQuickReplyOptions(text) {
            return extractQuickReplyGroups(text).flatMap(group => group.options);
        }

        function inferQuickReplyMode(text, options) {
            const tail = String(text || '').slice(-1200);
            if (/【\s*多选\s*】|\[\s*多选\s*\]|（\s*多选\s*）|\(\s*多选\s*\)|多选|可多选|选择多个|选多个|多项|勾选|哪些|哪几|都有哪些|需要哪些|包含哪些|覆盖哪些/.test(tail)) {
                return 'multi';
            }
            if (/【\s*单选\s*】|\[\s*单选\s*\]|（\s*单选\s*）|\(\s*单选\s*\)|单选|二选一|任选一|选一个|选择一个|是否|要不要|还是|或者/.test(tail)) {
                return 'single';
            }
            if ((options || []).length > 3 && /角色|模块|功能|端|渠道|范围|能力|场景|需求/.test(tail)) {
                return 'multi';
            }
            return 'single';
        }

        function disableQuickReplies(scope) {
            const root = scope || document;
            root.querySelectorAll('.quick-reply-btn:not(:disabled), .quick-reply-submit:not(:disabled), .quick-reply-clear:not(:disabled)').forEach(button => {
                button.disabled = true;
            });
        }

        function addQuickReplies(anchorEl, options, source = 'assistant', mode = 'single') {
            const normalized = [];
            for (const option of options || []) {
                const label = normalizeQuickReplyOption(option.label || option);
                const value = normalizeQuickReplyOption(option.value || option);
                if (!label || !value) continue;
                if (normalized.some(item => item.value === value)) continue;
                normalized.push({label, value});
                if (normalized.length >= 6) break;
            }
            if (!normalized.length || !anchorEl) return null;

            const wrap = document.createElement('div');
            const isMulti = mode === 'multi';
            wrap.className = 'quick-replies' + (source === 'event' ? ' from-event' : '') + (isMulti ? ' multi-select' : '');
            const selected = new Set();
            let submitButton = null;

            function updateMultiState() {
                if (submitButton) {
                    submitButton.disabled = selected.size === 0;
                    submitButton.textContent = selected.size ? '确认选择（' + selected.size + '）' : '确认选择';
                }
            }

            for (const option of normalized) {
                const button = document.createElement('button');
                button.className = 'quick-reply-btn';
                button.type = 'button';
                button.textContent = option.label;
                button.onclick = function() {
                    if (!isMulti) {
                        disableQuickReplies();
                        sendMessage(option.value);
                        return;
                    }
                    if (selected.has(option.value)) {
                        selected.delete(option.value);
                        button.classList.remove('selected');
                        button.setAttribute('aria-pressed', 'false');
                    } else {
                        selected.add(option.value);
                        button.classList.add('selected');
                        button.setAttribute('aria-pressed', 'true');
                    }
                    updateMultiState();
                };
                if (isMulti) {
                    button.setAttribute('aria-pressed', 'false');
                }
                wrap.appendChild(button);
            }

            if (isMulti) {
                const actions = document.createElement('div');
                actions.className = 'quick-reply-actions';

                submitButton = document.createElement('button');
                submitButton.className = 'quick-reply-submit';
                submitButton.type = 'button';
                submitButton.textContent = '确认选择';
                submitButton.disabled = true;
                submitButton.onclick = function() {
                    if (!selected.size) return;
                    disableQuickReplies();
                    sendMessage(Array.from(selected).join('、'));
                };

                const clearButton = document.createElement('button');
                clearButton.className = 'quick-reply-clear';
                clearButton.type = 'button';
                clearButton.textContent = '清空';
                clearButton.onclick = function() {
                    selected.clear();
                    wrap.querySelectorAll('.quick-reply-btn.selected').forEach(button => {
                        button.classList.remove('selected');
                        button.setAttribute('aria-pressed', 'false');
                    });
                    updateMultiState();
                };

                actions.appendChild(submitButton);
                actions.appendChild(clearButton);
                wrap.appendChild(actions);
            }

            const row = anchorEl.closest('.msg-row');
            if (row) {
                row.insertAdjacentElement('afterend', wrap);
            } else {
                anchorEl.insertAdjacentElement('afterend', wrap);
            }
            updateMultiState();
            scrollChat();
            return wrap;
        }

        function addQuickReplyGroups(anchorEl, groups, source = 'assistant') {
            const normalized = normalizeQuickReplyGroups(groups);
            if (normalized.length === 0) return null;
            if (normalized.length === 1) {
                const group = normalized[0];
                return addQuickReplies(anchorEl, group.options, source, group.mode);
            }

            const wrap = document.createElement('div');
            wrap.className = 'quick-replies grouped' + (source === 'event' ? ' from-event' : '');
            const selections = normalized.map(() => new Set());
            let submitButton = null;

            function updateGroupedState() {
                if (!submitButton) return;
                const complete = selections.every(selected => selected.size > 0);
                submitButton.disabled = !complete;
                const answered = selections.filter(selected => selected.size > 0).length;
                submitButton.textContent = complete ? '确认全部选择' : '确认全部选择（' + answered + '/' + normalized.length + '）';
            }

            normalized.forEach((group, groupIndex) => {
                const groupEl = document.createElement('div');
                groupEl.className = 'quick-reply-group' + (group.mode === 'multi' ? ' multi-select' : '');

                const title = document.createElement('div');
                title.className = 'quick-reply-title';
                title.textContent = (groupIndex + 1) + '. ' + (group.question || (group.mode === 'multi' ? '请选择一个或多个' : '请选择一个'));
                groupEl.appendChild(title);

                const optionsEl = document.createElement('div');
                optionsEl.className = 'quick-reply-options';
                for (const option of group.options) {
                    const button = document.createElement('button');
                    button.className = 'quick-reply-btn';
                    button.type = 'button';
                    button.textContent = option;
                    button.setAttribute('aria-pressed', 'false');
                    button.onclick = function() {
                        const selected = selections[groupIndex];
                        if (group.mode === 'multi') {
                            if (selected.has(option)) {
                                selected.delete(option);
                                button.classList.remove('selected');
                                button.setAttribute('aria-pressed', 'false');
                            } else {
                                selected.add(option);
                                button.classList.add('selected');
                                button.setAttribute('aria-pressed', 'true');
                            }
                        } else {
                            selected.clear();
                            selected.add(option);
                            optionsEl.querySelectorAll('.quick-reply-btn.selected').forEach(item => {
                                item.classList.remove('selected');
                                item.setAttribute('aria-pressed', 'false');
                            });
                            button.classList.add('selected');
                            button.setAttribute('aria-pressed', 'true');
                        }
                        updateGroupedState();
                    };
                    optionsEl.appendChild(button);
                }
                groupEl.appendChild(optionsEl);
                wrap.appendChild(groupEl);
            });

            const actions = document.createElement('div');
            actions.className = 'quick-reply-actions';

            submitButton = document.createElement('button');
            submitButton.className = 'quick-reply-submit';
            submitButton.type = 'button';
            submitButton.disabled = true;
            submitButton.textContent = '确认全部选择（0/' + normalized.length + '）';
            submitButton.onclick = function() {
                if (selections.some(selected => selected.size === 0)) return;
                disableQuickReplies();
                const answer = normalized.map((group, index) => {
                    const question = group.question || ('问题' + (index + 1));
                    return (index + 1) + '. ' + question + '：' + Array.from(selections[index]).join('、');
                }).join('\n');
                sendMessage(answer);
            };

            const clearButton = document.createElement('button');
            clearButton.className = 'quick-reply-clear';
            clearButton.type = 'button';
            clearButton.textContent = '清空';
            clearButton.onclick = function() {
                selections.forEach(selected => selected.clear());
                wrap.querySelectorAll('.quick-reply-btn.selected').forEach(button => {
                    button.classList.remove('selected');
                    button.setAttribute('aria-pressed', 'false');
                });
                updateGroupedState();
            };

            actions.appendChild(submitButton);
            actions.appendChild(clearButton);
            wrap.appendChild(actions);

            const row = anchorEl.closest('.msg-row');
            if (row) {
                row.insertAdjacentElement('afterend', wrap);
            } else {
                anchorEl.insertAdjacentElement('afterend', wrap);
            }
            updateGroupedState();
            scrollChat();
            return wrap;
        }

        function updateSessionLabel() {
            document.getElementById('session-label').textContent = sessionId ? '进行中' : '未开始';
        }

        function updateModeLabels() {
            const label = mode === 'one_shot' ? '一键生成' : '逐章确认';
            document.getElementById('mode-toggle').textContent = label;
        }

        function updateKnowledgeLabel() {
            const button = document.getElementById('knowledge-toggle');
            button.classList.toggle('active', useKnowledge);
            button.setAttribute('aria-pressed', String(useKnowledge));
        }

        function toggleMode() {
            mode = mode === 'one_shot' ? 'incremental' : 'one_shot';
            updateModeLabels();
        }

        function toggleKnowledge() {
            useKnowledge = !useKnowledge;
            updateKnowledgeLabel();
            inputEl.focus();
        }

        function openKnowledgeUpload() {
            knowledgeFileInput.value = '';
            knowledgeFileInput.click();
        }

        async function uploadKnowledgeFile() {
            const file = knowledgeFileInput.files && knowledgeFileInput.files[0];
            if (!file) return;

            const uploadButton = document.getElementById('upload-knowledge-btn');
            uploadButton.disabled = true;
            uploadButton.textContent = '上传中';
            addEvent('正在上传知识库文件：' + file.name);

            try {
                const form = new FormData();
                form.append('file', file);
                form.append('session_id', sessionId || 'default');

                const resp = await fetch('/api/pm/upload', {
                    method: 'POST',
                    body: form,
                });
                const data = await resp.json();
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || ('HTTP ' + resp.status));
                }
                addEvent('知识库上传完成：' + data.filename + ' 已索引。后续开启知识检索即可引用。');
            } catch (e) {
                addEvent('知识库上传失败：' + e.message);
            } finally {
                uploadButton.disabled = false;
                uploadButton.textContent = '上传知识';
                knowledgeFileInput.value = '';
                inputEl.focus();
            }
        }

        function usePrompt(text) {
            inputEl.value = text;
            autoGrowInput();
            inputEl.focus();
        }

        function newChat() {
            sessionId = 'session-' + Date.now();
            document.getElementById('main-header').textContent = 'PM Agent';
            document.getElementById('score-label').textContent = '完整度 0%';
            updateSessionLabel();
            chatInner().innerHTML = welcomeHtml();
            inputEl.value = '';
            autoGrowInput();
            renderSessions();
            inputEl.focus();
        }

        async function loadSessions() {
            try {
                const resp = await fetch('/api/pm/sessions');
                const data = await resp.json();
                sessionsCache = data.sessions || [];
                renderSessions();
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        function renderSessions() {
            const list = document.getElementById('session-list');
            const query = document.getElementById('session-search').value.trim().toLowerCase();
            const sessions = sessionsCache.filter(s => {
                const name = String(s.project_name || '未命名项目').toLowerCase();
                const sid = String(s.session_id || '').toLowerCase();
                return !query || name.includes(query) || sid.includes(query);
            });
            list.innerHTML = '';
            if (!sessions.length) {
                list.innerHTML = '<div class="session-empty">暂无历史会话</div>';
                return;
            }
            for (const s of sessions) {
                const item = document.createElement('div');
                item.className = 'session-item' +
                    (s.session_id === sessionId ? ' active' : '') +
                    (s.is_pinned ? ' pinned' : '');
                const projectName = s.project_name || '未命名项目';
                const updatedAt = s.updated_at ? new Date(s.updated_at).toLocaleDateString() : '刚刚';

                const title = document.createElement('div');
                title.className = 'session-title';

                const name = document.createElement('span');
                name.className = 'name';
                name.textContent = projectName;

                const meta = document.createElement('span');
                meta.className = 'meta';
                meta.textContent = updatedAt + ' · ' + Math.round((s.sufficiency_score || 0) * 100) + '%';

                const actions = document.createElement('div');
                actions.className = 'session-actions';

                const pinButton = document.createElement('button');
                pinButton.className = 'session-action-btn' + (s.is_pinned ? ' active' : '');
                pinButton.type = 'button';
                pinButton.innerHTML = iconSvg('arrow-up');
                pinButton.title = s.is_pinned ? '取消置顶' : '置顶会话';
                pinButton.setAttribute('aria-label', s.is_pinned ? '取消置顶会话' : '置顶会话');
                pinButton.onclick = function(event) {
                    toggleSessionPin(s.session_id, !s.is_pinned, event);
                };

                const deleteButton = document.createElement('button');
                deleteButton.className = 'session-action-btn danger';
                deleteButton.type = 'button';
                deleteButton.innerHTML = iconSvg('x');
                deleteButton.title = '删除会话';
                deleteButton.setAttribute('aria-label', '删除会话');
                deleteButton.onclick = function(event) {
                    deleteSession(s.session_id, event);
                };

                title.appendChild(name);
                title.appendChild(meta);
                actions.appendChild(pinButton);
                actions.appendChild(deleteButton);
                item.appendChild(title);
                item.appendChild(actions);
                item.onclick = function() { switchSession(s.session_id); };
                list.appendChild(item);
            }
        }

        function iconSvg(name) {
            if (name === 'arrow-up') {
                return '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">' +
                    '<path d="M12 19V5"></path><path d="M6 11l6-6 6 6"></path></svg>';
            }
            if (name === 'x') {
                return '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">' +
                    '<path d="M18 6L6 18"></path><path d="M6 6l12 12"></path></svg>';
            }
            return '';
        }

        async function toggleSessionPin(sid, isPinned, event) {
            event.stopPropagation();
            try {
                const resp = await fetch('/api/pm/sessions/' + encodeURIComponent(sid) + '/pin', {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({is_pinned: isPinned}),
                });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                await loadSessions();
            } catch (e) {
                console.error('Failed to update pinned session:', e);
            }
        }

        async function deleteSession(sid, event) {
            event.stopPropagation();
            if (!confirm('确定删除这个历史会话吗？删除后无法恢复。')) return;
            try {
                const resp = await fetch('/api/pm/sessions/' + encodeURIComponent(sid), {
                    method: 'DELETE',
                });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                sessionsCache = sessionsCache.filter(s => s.session_id !== sid);
                if (sid === sessionId) {
                    sessionId = null;
                    document.getElementById('main-header').textContent = 'PM Agent';
                    document.getElementById('score-label').textContent = '完整度 0%';
                    updateSessionLabel();
                    chatInner().innerHTML = welcomeHtml();
                    inputEl.value = '';
                    autoGrowInput();
                }
                renderSessions();
            } catch (e) {
                console.error('Failed to delete session:', e);
            }
        }

        async function loadSessionProfile(sid) {
            try {
                const resp = await fetch('/api/pm/profile/' + encodeURIComponent(sid));
                const data = await resp.json();
                if (data.profile) {
                    document.getElementById('main-header').textContent = data.profile.project_name || 'PM Agent';
                    document.getElementById('score-label').textContent =
                        '完整度 ' + Math.round((data.profile.sufficiency_score || 0) * 100) + '%';
                }
            } catch (e) {
                console.error('Failed to load profile:', e);
            }
        }

        async function loadHistory(sid) {
            clearChat();
            chatInner().innerHTML = welcomeHtml('正在加载历史会话', ' ');
            try {
                const resp = await fetch('/api/pm/history/' + encodeURIComponent(sid));
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                const messages = data.messages || [];
                clearChat();
                if (!messages.length) {
                    chatInner().innerHTML = welcomeHtml('这个会话还没有消息', '继续输入需求即可开始。');
                    return;
                }
                for (const message of messages) {
                    addMessage(message.role === 'user' ? 'user' : 'assistant', message.content || '');
                }
            } catch (e) {
                console.error('Failed to load history:', e);
                chatInner().innerHTML = welcomeHtml('历史消息加载失败', '可以继续输入新消息。');
            }
        }

        async function switchSession(sid) {
            sessionId = sid;
            updateSessionLabel();
            renderSessions();
            await Promise.all([loadSessionProfile(sid), loadHistory(sid)]);
            inputEl.focus();
        }

        async function sendMessage(replyText) {
            const msg = String(replyText || inputEl.value).trim();
            if (!msg) return;
            disableQuickReplies();
            inputEl.value = '';
            autoGrowInput();
            addMessage('user', msg);

            try {
                const resp = await fetch('/api/pm/agent', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: msg,
                        session_id: sessionId,
                        mode: mode,
                        use_knowledge: useKnowledge,
                    }),
                });

                if (!resp.ok || !resp.body) {
                    addEvent('请求失败: HTTP ' + resp.status);
                    return;
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let currentDiv = null;
                let currentContent = '';
                let buffer = '';
                let allowQuickReplies = false;
                let explicitQuickRepliesShown = false;

                function appendAssistantContent(content) {
                    currentContent += content;
                    if (!currentDiv) {
                        currentDiv = addMessage('assistant', '');
                    }
                    currentDiv.innerHTML = renderMarkdown(currentContent);
                }

                function handleEvent(event) {
                    switch (event.type) {
                        case 'content':
                            allowQuickReplies = true;
                            appendAssistantContent(event.data);
                            break;
                        case 'sufficiency':
                            document.getElementById('score-label').textContent =
                                '完整度 ' + Math.round(event.data.score * 100) + '%';
                            addEvent('需求完整度: ' + Math.round(event.data.score * 100) + '%');
                            break;
                        case 'ready_to_generate':
                            addQuickReplies(addEvent(event.data.message), [
                                {label: '生成 PRD', value: '生成PRD'},
                                {label: '继续补充需求', value: '继续补充需求'},
                            ], 'event');
                            explicitQuickRepliesShown = true;
                            break;
                        case 'status':
                            addEvent(event.data.message);
                            break;
                        case 'knowledge':
                            if (event.data.status === 'searching') {
                                addEvent('正在检索知识库...');
                            } else if (event.data.status === 'done') {
                                const count = Number(event.data.count || 0);
                                addEvent(count > 0 ? '知识检索完成：命中 ' + count + ' 条' : '知识检索完成：未找到相关文档');
                            }
                            break;
                        case 'prd_plan':
                            addEvent('PRD 大纲: ' + event.data.sections.map(s => s.title).join(' / '));
                            break;
                        case 'section_start':
                            addEvent('正在撰写: ' + event.data.title + ' (' + event.data.index + '/' + event.data.total + ')');
                            currentDiv = null;
                            currentContent = '';
                            allowQuickReplies = false;
                            break;
                        case 'section_content':
                            appendAssistantContent(event.data);
                            break;
                        case 'section_complete':
                            currentDiv = null;
                            currentContent = '';
                            break;
                        case 'awaiting_approval':
                            addQuickReplies(addEvent(event.data.message), [
                                {label: '继续生成下一章', value: '继续'},
                                {label: '先停止在这里', value: '先停止在这里'},
                            ], 'event');
                            explicitQuickRepliesShown = true;
                            break;
                        case 'prd_complete':
                            addEvent('PRD 生成完成');
                            break;
                        case 'error':
                            addEvent('Error: ' + event.data);
                            break;
                    }
                    scrollChat();
                }

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, {stream: true});
                    buffer = buffer.replace(/\r\n/g, '\n');
                    const frames = buffer.split('\n\n');
                    buffer = frames.pop() || '';

                    for (const frame of frames) {
                        const dataLine = frame.split('\n').find(line => line.startsWith('data: '));
                        if (!dataLine) continue;
                        try {
                            handleEvent(JSON.parse(dataLine.slice(6)));
                        } catch (e) {
                            console.error('Bad SSE frame:', e, frame);
                        }
                    }
                }

                if (allowQuickReplies && currentDiv && currentContent.trim() && !explicitQuickRepliesShown) {
                    addQuickReplyGroups(currentDiv, extractQuickReplyGroups(currentContent));
                }
            } catch (e) {
                addEvent('Error: ' + e.message);
            }
            loadSessions();
        }

        updateModeLabels();
        updateKnowledgeLabel();
        updateSessionLabel();
        loadSessions();
    </script>
</body>
</html>
