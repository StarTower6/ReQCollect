# ReQCollect — Docker Compose 编排
# 包含: 应用服务 + MySQL 8.0 + Nginx 反向代理
# 使用: docker compose up -d

services:
  # ── Nginx 反向代理 ──
  nginx:
    image: nginx:alpine
    container_name: reqcollect-nginx
    ports:
      - "8082:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      reqcollect:
        condition: service_started
    restart: unless-stopped
    networks:
      - reqcollect-net

  # ── ReQCollect 应用 ──
  reqcollect:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reqcollect-app
    env_file:
      - .env.docker
    ports:
      - "9900:9900"
    volumes:
      - ./pm_data:/app/pm_data
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9900/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - reqcollect-net

  # ── MySQL 8.0 数据库 ──
  mysql:
    image: mysql:8.0
    container_name: reqcollect-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-reqcollect_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-reqcollect}
      MYSQL_USER: ${MYSQL_USER:-reqcollect}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-reqcollect_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-reqcollect_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - reqcollect-net

volumes:
  mysql_data:
    name: reqcollect-mysql-data

networks:
  reqcollect-net:
    driver: bridge
